name: CI

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    test:
        name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
        runs-on: ${{ matrix.os }}
        timeout-minutes: 10

        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      python-version: "3.11"
                    - os: ubuntu-latest
                      python-version: "3.12"
                    - os: ubuntu-latest
                      python-version: "3.13"
                    - os: windows-latest
                      python-version: "3.11"

        steps:
            - name: Check out repository
              uses: actions/checkout@v6

            - name: Set up python
              uses: actions/setup-python@v6
              with:
                python-version: ${{ matrix.python-version }}
                cache: pip
                cache-dependency-path: pyproject.toml

            - name: Upgrade pip
              run: python -m pip install --upgrade pip

            - name: Install project
              run: python -m pip install ".[dev]"

            - name: Run tests
              run: python -m pytest -v